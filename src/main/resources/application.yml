spring:
  application:
    name: osucollector-api
  datasource:
    url: jdbc:postgresql://localhost:5432/osucards
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          osu:
            client-id: ${osu.client-id}
            client-secret: ${osu.client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/osu"
            scope: identify
        provider:
          osu:
            authorization-uri: https://osu.ppy.sh/oauth/authorize
            token-uri: https://osu.ppy.sh/oauth/token
            user-info-uri: https://osu.ppy.sh/api/v2/me
            user-name-attribute: id
server:
  port: 8080