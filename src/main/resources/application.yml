spring:
  application:
    name: osucollector-api
  datasource:
    url: jdbc:postgresql://localhost:5432/osucards
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080